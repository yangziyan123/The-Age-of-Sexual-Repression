<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>语录总览 | 峰哥亡命天涯语录</title>
    <meta name="description" content="峰哥亡命天涯语录总览。">
    <link rel="stylesheet" href="app/static/css/variables.css">
    <link rel="stylesheet" href="app/static/css/base.css">
    <link rel="stylesheet" href="app/static/css/layout.css">
    <link rel="stylesheet" href="app/static/css/components.css">
    <link rel="stylesheet" href="app/static/css/animations.css">
  </head>
  <body>
    <div class="site-grain" aria-hidden="true"></div>
    <header class="site-header">
      <div class="container nav-shell">
        <a href="home.html" class="brand">
          <span class="brand-cn">峰哥亡命天涯语录</span>
          <span class="brand-en">Archive of Exile</span>
        </a>
        <nav class="site-nav" aria-label="主导航">
          <a href="home.html">首页</a>
          <a href="quotes.html">语录总览</a>
          <a href="about.html">关于</a>
        </nav>
      </div>
    </header>

    <main class="page-shell">
      <section class="container section-block">
        <div class="section-head reveal">
          <h1>语录总览</h1>
          <p>按关键词和主题筛选</p>
        </div>

        <form id="filter-form" class="filter-panel reveal">
          <div class="filter-field filter-search">
            <label for="q">关键词</label>
            <input id="q" type="search" name="q" placeholder="输入语录关键词">
          </div>
          <div class="filter-field">
            <label for="topic">主题</label>
            <select id="topic" name="topic">
              <option value="">全部主题</option>
            </select>
          </div>
          <div class="filter-actions">
            <button class="btn btn-solid" type="submit">应用筛选</button>
            <a class="btn btn-outline" href="quotes.html">清空</a>
          </div>
        </form>

        <p id="result-count" class="result-count reveal"></p>

        <div id="quote-grid" class="quote-grid"></div>

        <nav id="pagination" class="pagination reveal" aria-label="分页"></nav>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>以语录见时代，以文字见人心。</p>
      </div>
    </footer>

    <script src="app/static/js/main.js" defer></script>
    <script type="module" src="app/static/js/quotes.js"></script>
  </body>
</html>
