{% extends "base.html" %}

{% block title %}导引页 | 峰哥亡命天涯语录{% endblock %}
{% block body_class %}is-landing{% endblock %}

{% block content %}
<section class="guide-shell container">
  <div class="guide-photo-frame">
    <img
      src="{{ url_for('static', filename='img/fengge-photo.png') }}"
      alt="峰哥照片"
      loading="eager"
      onerror="this.style.display='none'; this.nextElementSibling.style.display='grid';"
    >
  </div>

  <div class="guide-copy" aria-label="一切心理问题，都是性压抑">
    <p class="guide-vertical guide-vertical-left">都是性压抑</p>
    <p class="guide-vertical guide-vertical-right">一切心理问题</p>
  </div>
  <div class="guide-bottom-action">
    <a class="btn btn-solid btn-entry guide-enter" href="{{ url_for('main.home') }}">进入网站</a>
  </div>
</section>
{% endblock %}
