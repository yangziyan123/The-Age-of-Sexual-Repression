<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}峰哥亡命天涯语录{% endblock %}</title>
    <meta name="description" content="峰哥亡命天涯语录，记录时代、命运与生存的思考。">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/variables.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
  </head>
  <body class="{% block body_class %}{% endblock %}">
    <div class="site-grain" aria-hidden="true"></div>
    {% set hide_chrome = hide_chrome|default(false) %}
    {% if not hide_chrome %}
    <header class="site-header">
      <div class="container nav-shell">
        <a href="{{ url_for('main.home') }}" class="brand">
          <span class="brand-cn">峰哥亡命天涯语录</span>
          <span class="brand-en">Archive of Exile</span>
        </a>
        <nav class="site-nav" aria-label="主导航">
          <a href="{{ url_for('main.home') }}">首页</a>
          <a href="{{ url_for('quote.quote_list') }}">语录总览</a>
          <a href="{{ url_for('main.timeline') }}">时间轴</a>
          <a href="{{ url_for('main.about') }}">关于</a>
        </nav>
      </div>
    </header>
    {% endif %}

    <main class="page-shell{% if hide_chrome %} page-shell-landing{% endif %}">
      {% block content %}{% endblock %}
    </main>

    {% if not hide_chrome %}
    <footer class="site-footer">
      <div class="container footer-inner">
        <p>以语录见时代，以文字见人心。</p>
        <p class="footer-small">Flask 构建 · 历史语境风格</p>
      </div>
    </footer>
    {% endif %}

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
